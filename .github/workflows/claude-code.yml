name: ClaudeCode

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag to build and publish'
        required: false
        default: 'latest'
        type: string

permissions:
  contents: read

jobs:
  build:
    uses: ./.github/workflows/reusable-build.yml
    with:
      buildType: npm
      imageName: ilteoood/claude-code
      dockerFile: Dockerfile.claude-code
      defaultTag: latest
      versionCommand: '@anthropic-ai/claude-code'
      labelKey: claude_code_version
      dockerUser: ilteoood
    secrets:
      DOCKER_HUB_PASSWORD: ${{ secrets.DOCKER_HUB_PASSWORD }}