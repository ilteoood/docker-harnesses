name: ZeroClaw

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 3 * * 1'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag to build and publish'
        required: false
        default: 'latest'
        type: string

permissions:
  contents: read

jobs:
  build:
    outputs:
      tag: ${{ steps.latest_release.outputs.tag }}
    strategy:
      matrix:
        platform:
          - target: x86_64-unknown-linux-gnu
          - target: aarch64-unknown-linux-gnu
    runs-on: ubuntu-latest
    steps:
      - name: Get latest release
        id: latest_release
        run: |
          TAG=$(curl -sf -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" https://api.github.com/repos/zeroclaw-labs/zeroclaw/releases/latest | jq -r '.tag_name')
          if [ -z "$TAG" ] || [ "$TAG" = "null" ]; then
            echo "Failed to fetch latest release tag" >&2
            exit 1
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Checkout code
        uses: actions/checkout@v6
        with:
          repository: zeroclaw-labs/zeroclaw
          ref: ${{ steps.latest_release.outputs.tag }}
          path: zeroclaw

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: zeroclaw/web/package-lock.json

      - name: Install cross-linker (ARM64)
        if: matrix.platform.target == 'aarch64-unknown-linux-gnu'
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu libc6-dev-arm64-cross

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: ${{ matrix.platform.target }}

      - name: Build web dashboard
        working-directory: zeroclaw
        run: cargo web build

      - name: Build binary
        working-directory: zeroclaw
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          RUSTFLAGS: "-C strip=symbols"
        run: |
          cargo build \
            --release \
            --locked \
            --target ${{ matrix.platform.target }} \
            --features agent-runtime,whatsapp-web,rag-pdf,browser-native,plugins-wasm

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: zeroclaw-${{ matrix.platform.target }}
          path: zeroclaw/target/${{ matrix.platform.target }}/release/zeroclaw
          retention-days: 1

      - name: Upload web dashboard
        uses: actions/upload-artifact@v4
        with:
          name: web-dist-${{ matrix.platform.target }}
          path: zeroclaw/web/dist
          retention-days: 1

  docker_image:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Build and publish image
        uses: ilteoood/docker_buildx@master
        with:
          tag: ${{ github.event.inputs.tag || 'latest' }}
          platform: linux/amd64,linux/arm64
          imageName: ilteoood/zeroclaw
          dockerFile: Dockerfile.zeroclaw
          label: version=${{ needs.build.outputs.tag }}
          publish: true
          dockerUser: ilteoood
          dockerPassword: ${{ secrets.DOCKER_HUB_PASSWORD }}
