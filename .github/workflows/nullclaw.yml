name: NullClaw

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 3 * * 1'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag to build and publish'
        required: false
        default: 'latest'
        type: string

permissions:
  contents: read

jobs:
  docker_image:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Build and publish image
        uses: ilteoood/docker_buildx@master
        with:
          tag: ${{ github.event.inputs.tag || 'latest' }}
          platform: linux/amd64,linux/arm64
          imageName: ilteoood/nullclaw
          dockerFile: Dockerfile.nullclaw
          publish: true
          dockerUser: ilteoood
          dockerPassword: ${{ secrets.DOCKER_HUB_PASSWORD }}